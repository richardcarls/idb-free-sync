name: Feature request
description: Suggest an improvement or new capability
title: 'feat: '
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and API.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note effects on providers, stored files, or public APIs.
